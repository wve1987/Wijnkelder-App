<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wijnkelder</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Wijnkelder" />
  <meta name="theme-color" content="#8B1A1A" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #f5f0eb; font-family: Georgia, serif; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

    .btn { cursor: pointer; font-family: Georgia, serif; border: none; }
    .card { border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 2/3; cursor: pointer; transition: transform 0.2s; }
    .card:active { transform: scale(0.97); }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 20px; }
    .form-overlay { position: fixed; inset: 0; background: rgba(80,40,40,0.5); z-index: 200; overflow-y: auto; }
    .form-inner { background: #fff; min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 20px; }
    label.lbl { display: block; color: #8B1A1A; font-size: 11px; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.8px; text-transform: uppercase; }
    input, select, textarea { width: 100%; background: #f9f5f1; border: 1px solid #e0d5cc; border-radius: 8px; color: #2a1a1a; padding: 10px 12px; font-size: 14px; font-family: Georgia, serif; outline: none; box-sizing: border-box; }
    input:focus, select:focus, textarea:focus { border-color: #8B1A1A; }
    .tag { padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #e0d5cc; background: #f9f5f1; color: #666; }
    .tag.active { background: #8B1A1A; color: #fff; border-color: #8B1A1A; }
    .filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; border: 1px solid #e0d5cc; background: #fff; color: #888; font-family: Georgia, serif; }
    .filter-btn.active { color: #fff; }
    .grid { display: grid; gap: 8px; padding: 10px; }
    .star { font-size: 22px; cursor: pointer; }
    .zoom-btn { background: #f9f5f1; border: 1px solid #e0d5cc; color: #888; border-radius: 6px; padding: 4px 9px; cursor: pointer; font-size: 15px; font-family: Georgia, serif; }
    .submit-btn { width: 100%; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-family: Georgia, serif; letter-spacing: 0.5px; margin-bottom: 30px; cursor: pointer; }
    .qty-btn { width: 38px; height: 38px; background: #f9f5f1; border: 1px solid #e0d5cc; color: #2a1a1a; border-radius: 8px; cursor: pointer; font-size: 20px; font-family: Georgia, serif; }
    .open-btn { position: absolute; bottom: 38px; right: 6px; background: rgba(139,26,26,0.85); border: 1px solid #8B1A1A; color: #fff; font-size: 13px; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .action-btn { flex: 1; background: #f9f5f1; border: 1px solid #e0d5cc; color: #8B1A1A; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .del-btn { background: #fff0f0; border: 1px solid rgba(139,26,26,0.27); color: #8B1A1A; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .close-btn { flex: 1; background: #f9f5f1; border: 1px solid #e0d5cc; color: #888; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .section-title { color: #8B1A1A; font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }
    .divider { border-top: 1px solid #ecddd4; margin: 14px 0; padding-top: 14px; }
    .chip { background: #f9f5f1; border: 1px solid #e0d5cc; color: #888; font-size: 11px; padding: 3px 9px; border-radius: 20px; }
    .field { margin-bottom: 14px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const CATEGORIES = ["Rood","Wit","Rosé","Mousseux","Dessert","Fortified"];
const LANDEN = ["Italië","Frankrijk","Spanje","Portugal","Duitsland","Oostenrijk","Nederland","Argentinië","Chili","Zuid-Afrika","Australië","Nieuw-Zeeland","VS","Anders"];
const DRUIVEN = ["Cabernet Sauvignon","Merlot","Pinot Noir","Syrah/Shiraz","Sangiovese","Tempranillo","Nebbiolo","Chardonnay","Sauvignon Blanc","Riesling","Pinot Gris","Grenache","Malbec","Zinfandel","Viognier","Chenin Blanc","Anders"];
const ETEN = ["Rood vlees","Wit vlees","Vis","Schaaldieren","Pasta","Kaas","Groenten","Wild","Charcuterie","Dessert","Aperitief"];
const CAPACITEITEN = ["37.5 cl","75 cl","1.5 L","3 L"];
const JAREN = Array.from({length:50},(_,i)=>String(new Date().getFullYear()-i));
const CAT_COLORS = {Rood:"#8B1A1A",Wit:"#C8A000",Rosé:"#D4607A",Mousseux:"#888",Dessert:"#C4A35A",Fortified:"#7B3F00"};
const STORAGE_KEY = "wijnkelder_v1";

const loadData = () => { try { const d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):[]; } catch{return[];} };
const saveData = (d) => { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{} };

const EMPTY = {naam:"",categorie:"Rood",jaar:String(new Date().getFullYear()),prijs:"",capaciteit:"75 cl",alcohol:"",land:"",regio:"",subregio:"",appellatie:"",wijnmaker:"",druif:[],eten:[],score:0,opslaglocatie:"",opmerkingen:"",hoeveelheid:1,foto:null};

let state = {
  wijnen: loadData(),
  showForm: false,
  form: {...EMPTY},
  detail: null,
  zoom: 0,
  search: "",
  filterCat: "",
  editId: null,
};

function setState(updates) {
  Object.assign(state, typeof updates === 'function' ? updates(state) : updates);
  render();
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'htmlFor') el.setAttribute('for', v);
      else el.setAttribute(k, v);
    }
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return el;
}

function stars(value, onChange) {
  return h('div', {style:{display:'flex',gap:'4px'}},
    ...[1,2,3,4,5].map(s => {
      const sp = h('span', {className:'star', style:{color: s<=value ? '#c0392b' : '#ddd'}}, '★');
      if (onChange) sp.addEventListener('click', () => onChange(s));
      return sp;
    })
  );
}

function fieldEl(label, child) {
  return h('div', {className:'field'},
    h('label', {className:'lbl'}, label),
    child
  );
}

function inputEl(label, value, onChange, type='text', placeholder='') {
  const inp = h('input', {type, value, placeholder});
  inp.addEventListener('input', e => onChange(e.target.value));
  return fieldEl(label, inp);
}

function selectEl(label, value, onChange, options) {
  const sel = h('select', {},
    h('option', {value:''}, 'Kiezen...'),
    ...options.map(o => {
      const opt = h('option', {value:o}, o);
      if (o === value) opt.selected = true;
      return opt;
    })
  );
  sel.addEventListener('change', e => onChange(e.target.value));
  return fieldEl(label, sel);
}

function multiSelect(label, values, onChange, options) {
  const vals = values || [];
  const wrap = h('div', {style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
    ...options.map(o => {
      const btn = h('button', {className: 'tag' + (vals.includes(o) ? ' active' : '')}, o);
      btn.addEventListener('click', () => onChange(vals.includes(o) ? vals.filter(v=>v!==o) : [...vals, o]));
      return btn;
    })
  );
  return fieldEl(label, wrap);
}

function wijnCard(wijn) {
  const isEmpty = wijn.hoeveelheid === 0;
  const color = CAT_COLORS[wijn.categorie] || '#8B1A1A';
  const card = h('div', {
    className: 'card',
    style: {
      background: isEmpty ? '#f0ebe5' : '#faf6f2',
      border: `1px solid ${isEmpty ? '#ddd' : color+'44'}`,
      boxShadow: isEmpty ? 'none' : `0 4px 20px ${color}22`,
    }
  });
  card.addEventListener('click', () => setState({detail: wijn}));

  if (wijn.foto) {
    card.appendChild(h('img', {src:wijn.foto, alt:wijn.naam, style:{width:'100%',height:'100%',objectFit:'cover',opacity:isEmpty?'0.25':'1'}}));
  } else {
    card.appendChild(h('div', {style:{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:color+'11'}},
      h('span', {style:{fontSize:'32px',opacity:'0.3'}}, '🍷')
    ));
  }
  card.appendChild(h('div', {style:{position:'absolute',bottom:'0',left:'0',right:'0',height:'55%',background:'linear-gradient(to top,rgba(30,10,10,0.75),transparent)'}}));
  card.appendChild(h('div', {style:{position:'absolute',top:'6px',left:'6px',background:color,color:'#fff',fontSize:'9px',fontWeight:'700',padding:'2px 6px',borderRadius:'20px',letterSpacing:'0.5px',textTransform:'uppercase'}}, wijn.categorie));
  card.appendChild(h('div', {style:{position:'absolute',top:'6px',right:'6px',background:isEmpty?'#e0d5cc':'rgba(255,255,255,0.9)',color:isEmpty?'#aaa':'#8B4513',fontSize:'11px',fontWeight:'700',padding:'2px 7px',borderRadius:'20px',border:`1px solid ${isEmpty?'#ddd':'#8B451344'}`}}, wijn.hoeveelheid+'x'));
  card.appendChild(h('div', {style:{position:'absolute',bottom:'0',left:'0',right:'0',padding:'6px 8px'}},
    h('div', {style:{color:'#fff',fontSize:'11px',fontWeight:'600',lineHeight:'1.2',textShadow:'0 1px 4px #000',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}, wijn.naam),
    h('div', {style:{color:'#D4AF37',fontSize:'10px',opacity:'0.85'}}, wijn.jaar)
  ));
  if (!isEmpty) {
    const btn = h('button', {className:'open-btn'}, '🍾');
    btn.addEventListener('click', e => { e.stopPropagation(); openFles(wijn.id); });
    card.appendChild(btn);
  }
  if (isEmpty) {
    card.appendChild(h('div', {style:{position:'absolute',inset:'0',display:'flex',alignItems:'center',justifyContent:'center'}},
      h('span', {style:{color:'#bbb',fontSize:'11px',letterSpacing:'1px',textTransform:'uppercase'}}, 'leeg')
    ));
  }
  return card;
}

function openFles(id) {
  const wijnen = state.wijnen.map(w => w.id===id ? {...w, hoeveelheid:Math.max(0,w.hoeveelheid-1)} : w);
  saveData(wijnen);
  setState({wijnen, detail: wijnen.find(w=>w.id===id) || null});
}

function saveWijn() {
  if (!state.form.naam.trim()) return;
  let wijnen;
  if (state.editId) {
    wijnen = state.wijnen.map(w => w.id===state.editId ? {...state.form, id:state.editId} : w);
  } else {
    wijnen = [...state.wijnen, {...state.form, id:Date.now()}];
  }
  saveData(wijnen);
  setState({wijnen, showForm:false, form:{...EMPTY}, editId:null});
}

function deleteWijn(id) {
  const wijnen = state.wijnen.filter(w => w.id!==id);
  saveData(wijnen);
  setState({wijnen, detail:null});
}

function renderDetail() {
  const w = state.wijnen.find(x=>x.id===state.detail.id) || state.detail;
  const color = CAT_COLORS[w.categorie]||'#8B1A1A';

  const bg = h('div', {className:'modal-bg'});
  bg.addEventListener('click', () => setState({detail:null}));

  const modal = h('div', {className:'modal'});
  modal.addEventListener('click', e => e.stopPropagation());

  const topRow = h('div', {style:{display:'flex',gap:'14px',marginBottom:'18px'}});
  if (w.foto) {
    topRow.appendChild(h('img', {src:w.foto, alt:w.naam, style:{width:'85px',height:'125px',objectFit:'cover',borderRadius:'10px',flexShrink:'0'}}));
  } else {
    topRow.appendChild(h('div', {style:{width:'85px',height:'125px',background:'#f9f5f1',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}}, h('span',{style:{fontSize:'30px'}},'🍷')));
  }
  const info = h('div', {style:{flex:'1'}},
    h('span', {style:{background:color,color:'#fff',fontSize:'10px',padding:'2px 8px',borderRadius:'20px',textTransform:'uppercase'}}, w.categorie),
    h('h2', {style:{margin:'6px 0 2px',color:'#8B1A1A',fontSize:'17px',fontWeight:'400'}}, w.naam),
    h('div', {style:{color:'#999',fontSize:'12px',marginBottom:'8px'}}, [w.jaar, w.land, w.regio].filter(Boolean).join(' · ')),
    stars(w.score, null)
  );
  const qtyRow = h('div', {style:{marginTop:'10px',display:'flex',alignItems:'center',gap:'10px'}},
    h('div', {style:{color:'#8B1A1A',fontSize:'20px',fontWeight:'700'}}, w.hoeveelheid+'x')
  );
  if (w.hoeveelheid > 0) {
    const ob = h('button', {style:{background:'#8B1A1A',color:'#fff',border:'none',borderRadius:'8px',padding:'6px 14px',fontSize:'12px',cursor:'pointer',fontFamily:'Georgia,serif'}}, '🍾 Open fles');
    ob.addEventListener('click', () => openFles(w.id));
    qtyRow.appendChild(ob);
  }
  info.appendChild(qtyRow);
  topRow.appendChild(info);
  modal.appendChild(topRow);

  const details = [['Wijnmaker',w.wijnmaker],['Prijs',w.prijs?`€${w.prijs}`:''],['Capaciteit',w.capaciteit],['Alcohol',w.alcohol?`${w.alcohol}%`:''],['Appellatie',w.appellatie],['Subregio',w.subregio],['Opslag',w.opslaglocatie]].filter(([,v])=>v);
  if (details.length) {
    const grid = h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',marginBottom:'14px'}},
      ...details.map(([k,v]) => h('div',{},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'2px'}},k),h('div',{style:{color:'#555',fontSize:'13px'}},v)))
    );
    modal.appendChild(grid);
  }

  if (w.druif?.length) modal.appendChild(h('div',{style:{marginBottom:'10px'}},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'5px'}},'Druif'),h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px'}},...w.druif.map(d=>h('span',{className:'chip'},d)))));
  if (w.eten?.length) modal.appendChild(h('div',{style:{marginBottom:'10px'}},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'5px'}},'Spijscombinaties'),h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px'}},...w.eten.map(d=>h('span',{className:'chip'},d)))));
  if (w.opmerkingen) modal.appendChild(h('div',{style:{background:'#f9f5f1',borderRadius:'10px',padding:'10px 14px',marginBottom:'14px',color:'#999',fontSize:'13px',fontStyle:'italic'}},`"${w.opmerkingen}"`));

  const editBtn = h('button',{className:'action-btn'},'✏️ Bewerken');
  editBtn.addEventListener('click', () => { setState({form:{...w},editId:w.id,detail:null,showForm:true}); });
  const delBtn = h('button',{className:'del-btn'},'🗑️');
  delBtn.addEventListener('click', () => deleteWijn(w.id));
  const closeBtn = h('button',{className:'close-btn'},'Sluiten');
  closeBtn.addEventListener('click', () => setState({detail:null}));
  modal.appendChild(h('div',{style:{display:'flex',gap:'8px'}},editBtn,delBtn,closeBtn));

  bg.appendChild(modal);
  return bg;
}

function renderForm() {
  const f = state.form;
  const sf = (k,v) => setState({form:{...state.form,[k]:v}});

  const overlay = h('div',{className:'form-overlay'});
  const inner = h('div',{className:'form-inner'});

  const header = h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',borderBottom:'1px solid #ecddd4',paddingBottom:'14px'}},
    h('h2',{style:{margin:'0',color:'#8B1A1A',fontWeight:'400',fontSize:'19px'}}, state.editId?'Wijn bewerken':'Wijn toevoegen')
  );
  const closeX = h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'22px',cursor:'pointer'}},'✕');
  closeX.addEventListener('click', () => setState({showForm:false}));
  header.appendChild(closeX);
  inner.appendChild(header);

  // Foto
  const fotoWrap = h('div',{className:'field'}, h('label',{className:'lbl'},'Foto'));
  const fotoBox = h('div',{style:{border:'2px dashed #e0d5cc',borderRadius:'12px',height:'130px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',background:'#f5f0eb'}});
  if (f.foto) {
    fotoBox.appendChild(h('img',{src:f.foto,alt:'',style:{width:'100%',height:'100%',objectFit:'cover'}}));
  } else {
    fotoBox.appendChild(h('div',{style:{textAlign:'center',color:'#bbb'}},h('div',{style:{fontSize:'26px',marginBottom:'5px'}},'📷'),h('div',{style:{fontSize:'12px'}},'Tik om foto toe te voegen')));
  }
  const fileInp = h('input',{type:'file',accept:'image/*',style:{display:'none'}});
  fileInp.addEventListener('change', e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const base64 = ev.target.result;
      sf('foto', base64);
      // Laad-indicator
      fotoBox.innerHTML = '';
      const loadDiv = document.createElement('div');
      loadDiv.style.cssText = 'text-align:center;color:#8B1A1A';
      loadDiv.innerHTML = '<div style="font-size:22px;margin-bottom:6px">🔍</div><div style="font-size:12px">Etiket herkennen...</div>';
      fotoBox.appendChild(loadDiv);
      try {
        const imageData = base64.split(',')[1];
        const mediaType = base64.split(';')[0].split(':')[1];
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: [
                {type:'image', source:{type:'base64', media_type:mediaType, data:imageData}},
                {type:'text', text:'Analyseer dit wijnetiket en geef ALLEEN een JSON object terug, geen uitleg. Formaat: {"naam":"","categorie":"Rood|Wit|Rose|Mousseux|Dessert|Fortified","jaar":"","alcohol":"","land":"","regio":"","subregio":"","appellatie":"","wijnmaker":"","druif":[],"opmerkingen":""} Vul alleen in wat je zeker weet van het etiket. druif is een array van strings. Geef ALLEEN JSON terug.'}
              ]
            }]
          })
        });
        const data = await response.json();
        const text = data.content && data.content[0] ? data.content[0].text : '';
        const clean = text.replace(/```json|```/g,'').trim();
        const parsed = JSON.parse(clean);
        setState({form: Object.assign({}, state.form, {foto: base64}, parsed)});
      } catch(err) {
        setState({form: Object.assign({}, state.form, {foto: base64})});
      }
    };
    reader.readAsDataURL(file);
  });
  fotoBox.addEventListener('click', () => fileInp.click());
  fotoWrap.appendChild(fotoBox);
  fotoWrap.appendChild(fileInp);
  inner.appendChild(fotoWrap);

  inner.appendChild(inputEl('Naam van wijn *', f.naam, v=>sf('naam',v), 'text', 'bijv. Barolo Riserva'));
  inner.appendChild(selectEl('Categorie', f.categorie, v=>sf('categorie',v), CATEGORIES));

  const row1 = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
    selectEl('Jaar', f.jaar, v=>sf('jaar',v), JAREN),
    inputEl('Prijs (€)', f.prijs, v=>sf('prijs',v), 'number', '0.00')
  );
  inner.appendChild(row1);
  const row2 = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
    selectEl('Capaciteit', f.capaciteit, v=>sf('capaciteit',v), CAPACITEITEN),
    inputEl('Alcohol (%)', f.alcohol, v=>sf('alcohol',v), 'number', '12.5')
  );
  inner.appendChild(row2);

  // Hoeveelheid
  const minBtn = h('button',{className:'qty-btn'},'−');
  minBtn.addEventListener('click', () => sf('hoeveelheid', Math.max(0,f.hoeveelheid-1)));
  const plusBtn = h('button',{className:'qty-btn'},'+');
  plusBtn.addEventListener('click', () => sf('hoeveelheid', f.hoeveelheid+1));
  inner.appendChild(fieldEl('Hoeveelheid', h('div',{style:{display:'flex',alignItems:'center',gap:'14px'}},
    minBtn, h('span',{style:{color:'#8B1A1A',fontSize:'20px',fontWeight:'700',minWidth:'28px',textAlign:'center'}}, String(f.hoeveelheid)), plusBtn
  )));

  inner.appendChild(h('div',{className:'divider'},
    h('div',{className:'section-title'},'Oorsprong'),
    selectEl('Land', f.land, v=>sf('land',v), LANDEN),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
      inputEl('Regio', f.regio, v=>sf('regio',v), 'text', 'bijv. Toscane'),
      inputEl('Subregio', f.subregio, v=>sf('subregio',v), 'text', 'bijv. Chianti')
    ),
    inputEl('Appellatie', f.appellatie, v=>sf('appellatie',v), 'text', 'bijv. Barolo DOCG'),
    inputEl('Wijnmaker / Domein', f.wijnmaker, v=>sf('wijnmaker',v), 'text', 'bijv. Antinori')
  ));

  inner.appendChild(h('div',{className:'divider'},
    h('div',{className:'section-title'},'Overige informatie'),
    multiSelect('Druivensoort', f.druif, v=>sf('druif',v), DRUIVEN),
    multiSelect('Spijscombinaties', f.eten, v=>sf('eten',v), ETEN),
    inputEl('Opslaglocatie', f.opslaglocatie, v=>sf('opslaglocatie',v), 'text', 'bijv. Rek A, positie 3'),
    fieldEl('Score', stars(f.score, v=>sf('score',v))),
    fieldEl('Opmerkingen', (() => {
      const ta = h('textarea',{placeholder:'Tasting notes, bijzonderheden...',rows:'3'}, f.opmerkingen||'');
      ta.style.resize = 'vertical';
      ta.addEventListener('input', e => sf('opmerkingen', e.target.value));
      return ta;
    })())
  ));

  const submitBtn = h('button',{className:'submit-btn',style:{background:f.naam.trim()?'#8B1A1A':'#e8e0d8',color:f.naam.trim()?'#fff':'#bbb'}},
    state.editId ? '✓ Wijzigingen opslaan' : '✓ Wijn toevoegen'
  );
  submitBtn.addEventListener('click', saveWijn);
  inner.appendChild(submitBtn);

  overlay.appendChild(inner);
  return overlay;
}

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  const {wijnen, zoom, search, filterCat} = state;
  const cols = [3,4,5][zoom];
  const totaal = wijnen.reduce((a,w)=>a+w.hoeveelheid,0);
  const waarde = wijnen.reduce((a,w)=>a+(parseFloat(w.prijs)||0)*w.hoeveelheid,0);

  const gefilterd = wijnen.filter(w => {
    const q = search.toLowerCase();
    return (!q || w.naam.toLowerCase().includes(q) || (w.wijnmaker||'').toLowerCase().includes(q) || (w.land||'').toLowerCase().includes(q))
      && (!filterCat || w.categorie===filterCat);
  });

  // Header
  const header = h('div',{style:{background:'linear-gradient(135deg,#fff5f0,#f5ede6)',borderBottom:'1px solid #c9856633',padding:'20px 16px 12px'}});

  const topRow = h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}},
    h('div',{},
      h('h1',{style:{margin:'0',fontSize:'24px',color:'#8B1A1A',fontWeight:'400',letterSpacing:'2px',textTransform:'uppercase'}},'🍷 Wijnkelder'),
      h('p',{style:{margin:'3px 0 0',color:'#aaa',fontSize:'12px',letterSpacing:'1px'}}, `${totaal} flessen · €${waarde.toFixed(0)}`)
    )
  );
  const addBtn = h('button',{className:'btn',style:{background:'#8B1A1A',color:'#fff',borderRadius:'10px',padding:'10px 16px',fontSize:'13px',letterSpacing:'0.5px'}},'+ Toevoegen');
  addBtn.addEventListener('click', () => setState({form:{...EMPTY},editId:null,showForm:true}));
  topRow.querySelector('div').parentNode.appendChild(addBtn);
  topRow.appendChild(addBtn);
  header.appendChild(topRow);

  const searchInp = h('input',{type:'text',placeholder:'Zoeken...',value:search,style:{width:'100%',background:'#fff',border:'1px solid #e0d5cc',borderRadius:'8px',color:'#2a1a1a',padding:'8px 12px',fontSize:'13px',outline:'none',marginBottom:'10px',boxSizing:'border-box'}});
  searchInp.addEventListener('input', e => setState({search:e.target.value}));
  header.appendChild(searchInp);

  const filterRow = h('div',{style:{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'4px',alignItems:'center'}});
  ['', ...CATEGORIES].forEach(c => {
    const btn = h('button',{className:'filter-btn'+(filterCat===c?' active':''),style:{background:filterCat===c?(CAT_COLORS[c]||'#8B1A1A'):'#fff',borderColor:filterCat===c?(CAT_COLORS[c]||'#8B1A1A'):'#e0d5cc'}}, c||'Alle');
    btn.addEventListener('click', () => setState({filterCat:c}));
    filterRow.appendChild(btn);
  });
  const zoomWrap = h('div',{style:{marginLeft:'auto',display:'flex',gap:'4px'}});
  const zm = h('button',{className:'zoom-btn'},'−'); zm.addEventListener('click',()=>setState({zoom:Math.max(0,state.zoom-1)}));
  const zp = h('button',{className:'zoom-btn'},'+'); zp.addEventListener('click',()=>setState({zoom:Math.min(2,state.zoom+1)}));
  zoomWrap.appendChild(zm); zoomWrap.appendChild(zp);
  filterRow.appendChild(zoomWrap);
  header.appendChild(filterRow);
  root.appendChild(header);

  // Gallery
  if (gefilterd.length === 0) {
    root.appendChild(h('div',{style:{textAlign:'center',padding:'60px 20px',color:'#bbb'}},h('div',{style:{fontSize:'40px',marginBottom:'10px'}},'🍷'),h('div',{},'Geen wijnen gevonden')));
  } else {
    const grid = h('div',{className:'grid',style:{gridTemplateColumns:`repeat(${cols},1fr)`}});
    gefilterd.forEach(w => grid.appendChild(wijnCard(w)));
    root.appendChild(grid);
  }

  if (state.detail) root.appendChild(renderDetail());
  if (state.showForm) root.appendChild(renderForm());
}

render();
</script>
</body>
</html>
