<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Wijnkelder</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Wijnkelder" />
  <meta name="theme-color" content="#8B1A1A" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #f5f0eb; font-family: Georgia, serif; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
    .btn { cursor: pointer; font-family: Georgia, serif; border: none; }
    .card { border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 2/3; cursor: pointer; transition: transform 0.2s; }
    .card:active { transform: scale(0.97); }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 20px; }
    .form-overlay { position: fixed; inset: 0; background: #fff; z-index: 200; overflow-y: auto; max-width: 480px; margin: 0 auto; }
    label.lbl { display: block; color: #8B1A1A; font-size: 11px; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.8px; text-transform: uppercase; }
    input, select, textarea { width: 100%; background: #f9f5f1; border: 1px solid #e0d5cc; border-radius: 8px; color: #2a1a1a; padding: 10px 12px; font-size: 14px; font-family: Georgia, serif; outline: none; box-sizing: border-box; }
    input:focus, select:focus, textarea:focus { border-color: #8B1A1A; }
    .tag { padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #e0d5cc; background: #f9f5f1; color: #666; }
    .tag.active { background: #8B1A1A; color: #fff; border-color: #8B1A1A; }
    .filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; border: 1px solid #e0d5cc; background: #fff; color: #888; font-family: Georgia, serif; }
    .filter-btn.active { color: #fff; }
    .grid { display: grid; gap: 8px; padding: 10px; }
    .star { font-size: 22px; cursor: pointer; }
    .qty-btn { width: 38px; height: 38px; background: #f9f5f1; border: 1px solid #e0d5cc; color: #2a1a1a; border-radius: 8px; cursor: pointer; font-size: 20px; font-family: Georgia, serif; }
    .open-btn { position: absolute; bottom: 38px; right: 6px; background: rgba(139,26,26,0.85); border: 1px solid #8B1A1A; color: #fff; font-size: 13px; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .action-btn { flex: 1; background: #f9f5f1; border: 1px solid #e0d5cc; color: #8B1A1A; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .del-btn { background: #fff0f0; border: 1px solid rgba(139,26,26,0.27); color: #8B1A1A; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .close-btn { flex: 1; background: #f9f5f1; border: 1px solid #e0d5cc; color: #888; border-radius: 10px; padding: 10px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .section-title { color: #8B1A1A; font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }
    .divider { border-top: 1px solid #ecddd4; margin: 14px 0; padding-top: 14px; }
    .chip { background: #f9f5f1; border: 1px solid #e0d5cc; color: #888; font-size: 11px; padding: 3px 9px; border-radius: 20px; }
    .field { margin-bottom: 14px; }
    .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #ecddd4; padding: 16px 20px; position: sticky; top: 0; background: #fff; z-index: 10; }
    .form-body { padding: 0 20px 30px; }
    .custom-dropdown-list { display: none; position: absolute; left: 0; right: 0; z-index: 1000; background: #fff; border: 1px solid #e0d5cc; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); max-height: 220px; overflow-y: auto; margin-top: 2px; }

    /* Login screen */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #fff5f0, #f5ede6); }
    .login-box { background: #fff; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 8px 40px rgba(139,26,26,0.1); }
    .login-title { color: #8B1A1A; font-size: 26px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; text-align: center; }
    .login-sub { color: #bbb; font-size: 12px; text-align: center; margin-bottom: 28px; letter-spacing: 1px; }
    .login-btn { width: 100%; background: #8B1A1A; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; cursor: pointer; font-family: Georgia, serif; margin-top: 8px; }
    .login-switch { text-align: center; margin-top: 16px; color: #aaa; font-size: 13px; }
    .login-switch span { color: #8B1A1A; cursor: pointer; text-decoration: underline; }
    .login-err { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }
    .loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #8B1A1A; font-size: 16px; letter-spacing: 1px; }
  </style>
</head>
<body>
<div id="root"><div class="loading">🍷 Laden...</div></div>
<script>
const SUPABASE_URL = 'https://ybxfqjngspzbpqucjoyd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mvNMOYZNNjb89QjL5oyh7w_PsHyfalj';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const BASE_CATEGORIES = ["Rood","Wit","Rosé","Mousseux","Dessert","Fortified"];
const BASE_LANDEN = ["Italië","Frankrijk","Spanje","Portugal","Duitsland","Oostenrijk","Nederland","Argentinië","Chili","Zuid-Afrika","Australië","Nieuw-Zeeland","VS","Anders"];
const BASE_DRUIVEN = ["Cabernet Sauvignon","Merlot","Pinot Noir","Syrah/Shiraz","Sangiovese","Tempranillo","Nebbiolo","Chardonnay","Sauvignon Blanc","Riesling","Pinot Gris","Grenache","Malbec","Zinfandel","Viognier","Chenin Blanc","Anders"];
const BASE_ETEN = ["Rood vlees","Wit vlees","Vis","Schaaldieren","Pasta","Kaas","Groenten","Wild","Charcuterie","Dessert","Aperitief"];
const BASE_BEWARING = ["Nu drinken","1-2 jaar","3-5 jaar","5-10 jaar","10+ jaar","Anders"];
const BASE_HERKOMST = ["Gekregen","AH","Plus","Aldi","Lidl","Gall & Gall","Hanos","Sligro","Online","Anders"];
const CAPACITEITEN = ["37.5 cl","75 cl","1.5 L","3 L"];
const JAREN = Array.from({length:50},(_,i)=>String(new Date().getFullYear()-i));
const CAT_COLORS = {Rood:"#8B1A1A",Wit:"#C8A000",Rosé:"#D4607A",Mousseux:"#888",Dessert:"#C4A35A",Fortified:"#7B3F00"};

const EMPTY = {naam:"",categorie:"Rood",jaar:String(new Date().getFullYear()),prijs:"",capaciteit:"75 cl",alcohol:"",land:"",regio:"",subregio:"",appellatie:"",wijnmaker:"",druif:[],druif_single:"",eten:[],score:0,opslaglocatie:"",bewaring:"",herkomst:"",van_wie:"",url:"",opmerkingen:"",hoeveelheid:1,foto:null};

let state = {
  user: null,
  loading: true,
  loginMode: 'login',
  loginErr: '',
  wijnen: [],
  custom: {landen:[],druiven:[],bewaring:[],herkomst:[]},
  showForm: false,
  form: {...EMPTY},
  detail: null,
  zoom: 4,
  search: "",
  filterCat: "",
  editId: null,
  formScroll: 0,
  saving: false,
};

// ── Supabase helpers ──────────────────────────────────────
async function loadWijnen() {
  const {data} = await sb.from('wijnen').select('*').order('created_at', {ascending:false});
  state.wijnen = (data||[]).map(r => ({...r, druif: r.druif||[], eten: r.eten||[]}));
}
async function loadCustom() {
  const {data} = await sb.from('custom_opties').select('*').limit(1);
  if (data && data.length > 0) state.custom = {...{landen:[],druiven:[],bewaring:[],herkomst:[]}, ...data[0].data};
}
async function saveCustom() {
  const {data} = await sb.from('custom_opties').select('id').limit(1);
  if (data && data.length > 0) {
    await sb.from('custom_opties').update({data: state.custom}).eq('id', data[0].id);
  } else {
    await sb.from('custom_opties').insert({data: state.custom, user_id: state.user.id});
  }
}
async function saveWijnDb(wijn) {
  const {id, ...rest} = wijn;
  if (id && !String(id).startsWith('local')) {
    const {data} = await sb.from('wijnen').update(rest).eq('id', id).select().single();
    return data;
  } else {
    const {data} = await sb.from('wijnen').insert({...rest, user_id: state.user.id}).select().single();
    return data;
  }
}
async function deleteWijnDb(id) {
  await sb.from('wijnen').delete().eq('id', id);
}

// ── Custom option helpers ─────────────────────────────────
function getLanden() { const c=state.custom.landen||[]; return [...BASE_LANDEN.filter(l=>l!=='Anders'),...c,'Anders']; }
function getDruiven() { const c=state.custom.druiven||[]; return [...BASE_DRUIVEN.filter(d=>d!=='Anders'),...c,'Anders']; }
function getBewaring() { const c=state.custom.bewaring||[]; return [...BASE_BEWARING.filter(d=>d!=='Anders'),...c,'Anders']; }
function getHerkomst() { const c=state.custom.herkomst||[]; return [...BASE_HERKOMST.filter(d=>d!=='Anders'),...c,'Anders']; }

async function addCustom(type, naam) {
  if (!naam.trim()) return;
  state.custom[type] = [...new Set([...(state.custom[type]||[]), naam.trim()])];
  await saveCustom();
}

async function deleteCustomItem(type, naam) {
  const gebruiktIn = state.wijnen.filter(w => {
    if (type==='landen') return w.land===naam;
    if (type==='druiven') return w.druif&&w.druif.includes(naam);
    return false;
  });
  const label = type==='landen'?'land':'druif';
  if (!confirm(`Wil je "${naam}" verwijderen uit de lijst?`)) return;
  if (gebruiktIn.length>0) {
    if (!confirm(`Let op: ${gebruiktIn.length} wijn(en) hebben "${naam}" als ${label}. Dit veld wordt leeggemaakt. Doorgaan?`)) return;
    for (const w of gebruiktIn) {
      const updated = type==='landen' ? {...w,land:''} : {...w,druif:w.druif.filter(d=>d!==naam)};
      await saveWijnDb(updated);
    }
    await loadWijnen();
  }
  state.custom[type] = (state.custom[type]||[]).filter(i=>i!==naam);
  await saveCustom();
  if (state.form.land===naam) state.form.land='';
  if (state.form.druif_single===naam) state.form.druif_single='';
  doRender();
}

// ── DOM helpers ───────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) for (const [k,v] of Object.entries(attrs)) {
    if (k==='className') el.className=v;
    else if (k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==='htmlFor') el.setAttribute('for',v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat()) {
    if (c==null||c===false) continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}

function stars(value, onChange) {
  return h('div',{style:{display:'flex',gap:'4px'}},
    ...[1,2,3,4,5].map(s=>{
      const sp=h('span',{className:'star',style:{color:s<=value?'#c0392b':'#ddd'}},'★');
      if(onChange) sp.addEventListener('click',()=>{onChange(s);doRender();});
      return sp;
    })
  );
}
function fieldEl(label,child){return h('div',{className:'field'},h('label',{className:'lbl'},label),child);}

function inputEl(label,stateKey,type='text',placeholder=''){
  const inp=h('input',{type,value:state.form[stateKey]||'',placeholder});
  inp.addEventListener('input',e=>{state.form[stateKey]=e.target.value;});
  return fieldEl(label,inp);
}

function selectEl(label,stateKey,options){
  const value=state.form[stateKey]||'';
  const customLijst=stateKey==='land'?(state.custom.landen||[]):stateKey==='druif_single'?(state.custom.druiven||[]):stateKey==='bewaring'?(state.custom.bewaring||[]):stateKey==='herkomst'?(state.custom.herkomst||[]):[];
  const customType=stateKey==='land'?'landen':stateKey==='druif_single'?'druiven':stateKey==='bewaring'?'bewaring':'herkomst';

  const trigger=h('div',{style:{width:'100%',background:'#f9f5f1',border:'1px solid #e0d5cc',borderRadius:'8px',color:value?'#2a1a1a':'#aaa',padding:'10px 12px',fontSize:'14px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',fontFamily:'Georgia,serif',userSelect:'none'}},
    h('span',{},value||'Kiezen...'),h('span',{style:{color:'#aaa',fontSize:'12px'}},'▼')
  );
  const dropdown=h('div',{className:'custom-dropdown-list'});
  options.forEach(o=>{
    const isCustom=customLijst.includes(o);
    const row=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',cursor:'pointer',fontSize:'14px',background:o===value?'#fff5f0':'#fff',color:o===value?'#8B1A1A':'#2a1a1a',borderBottom:'1px solid #f5f0eb'}});
    row.appendChild(h('span',{},o||'Kiezen...'));
    if(isCustom){
      const delBtn=h('button',{style:{background:'none',border:'none',color:'#e74c3c',fontSize:'16px',cursor:'pointer',padding:'0 4px',lineHeight:'1',flexShrink:'0'}},'×');
      delBtn.addEventListener('click',e=>{e.stopPropagation();dropdown.style.display='none';deleteCustomItem(customType,o);});
      row.appendChild(delBtn);
    }
    row.addEventListener('click',()=>{state.form[stateKey]=o;dropdown.style.display='none';doRender();});
    dropdown.appendChild(row);
  });
  trigger.addEventListener('click',e=>{
    e.stopPropagation();
    const isOpen=dropdown.style.display!=='none';
    document.querySelectorAll('.custom-dropdown-list').forEach(d=>d.style.display='none');
    dropdown.style.display=isOpen?'none':'block';
  });
  document.addEventListener('click',()=>{dropdown.style.display='none';});
  const wrap=h('div',{style:{position:'relative'}},trigger,dropdown);
  if(value==='Anders'){
    const inp=h('input',{type:'text',placeholder:`Eigen ${label.toLowerCase()} toevoegen...`,style:{marginTop:'8px'}});
    inp.addEventListener('input',e=>{state.form[stateKey+'_custom']=e.target.value;});
    inp.addEventListener('blur',async e=>{
      const val=e.target.value.trim();
      if(val){
        await addCustom(customType,val);
        state.form[stateKey]=val;
        doRender();
      }
    });
    wrap.appendChild(inp);
  }
  return fieldEl(label,wrap);
}

function multiSelectEl(label,stateKey,options){
  const vals=state.form[stateKey]||[];
  const wrap=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
    ...options.map(o=>{
      const btn=h('button',{className:'tag'+(vals.includes(o)?' active':'')},o);
      btn.addEventListener('click',()=>{state.form[stateKey]=vals.includes(o)?vals.filter(v=>v!==o):[...vals,o];doRender();});
      return btn;
    })
  );
  return fieldEl(label,wrap);
}

// ── Wine card ─────────────────────────────────────────────
function wijnCard(wijn){
  const isEmpty=wijn.hoeveelheid===0;
  const color=CAT_COLORS[wijn.categorie]||'#8B1A1A';
  const card=h('div',{className:'card',style:{background:isEmpty?'#f0ebe5':'#faf6f2',border:`1px solid ${isEmpty?'#ddd':color+'44'}`,boxShadow:isEmpty?'none':`0 4px 20px ${color}22`}});
  card.addEventListener('click',()=>setState({detail:wijn}));
  if(wijn.foto) card.appendChild(h('img',{src:wijn.foto,alt:wijn.naam,style:{width:'100%',height:'100%',objectFit:'cover',opacity:isEmpty?'0.25':'1'}}));
  else card.appendChild(h('div',{style:{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:color+'11'}},h('span',{style:{fontSize:'32px',opacity:'0.3'}},'🍷')));
  card.appendChild(h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',height:'55%',background:'linear-gradient(to top,rgba(30,10,10,0.75),transparent)'}}));
  card.appendChild(h('div',{style:{position:'absolute',top:'6px',left:'6px',background:color,color:'#fff',fontSize:'9px',fontWeight:'700',padding:'2px 6px',borderRadius:'20px',letterSpacing:'0.5px',textTransform:'uppercase'}},wijn.categorie));
  card.appendChild(h('div',{style:{position:'absolute',top:'6px',right:'6px',background:isEmpty?'#e0d5cc':'rgba(255,255,255,0.9)',color:isEmpty?'#aaa':'#8B4513',fontSize:'11px',fontWeight:'700',padding:'2px 7px',borderRadius:'20px'}},wijn.hoeveelheid+'x'));
  card.appendChild(h('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',padding:'6px 8px'}},
    h('div',{style:{color:'#fff',fontSize:'11px',fontWeight:'600',lineHeight:'1.2',textShadow:'0 1px 4px #000',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}},wijn.naam),
    h('div',{style:{color:'#D4AF37',fontSize:'10px',opacity:'0.85'}},wijn.jaar)
  ));
  if(!isEmpty){
    const btn=h('button',{className:'open-btn'},'🍾');
    btn.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();openFles(wijn.id);});
    btn.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();openFles(wijn.id);});
    card.appendChild(btn);
  }
  if(isEmpty) card.appendChild(h('div',{style:{position:'absolute',inset:'0',display:'flex',alignItems:'center',justifyContent:'center'}},h('span',{style:{color:'#bbb',fontSize:'11px',letterSpacing:'1px',textTransform:'uppercase'}},'leeg')));
  return card;
}

// ── Actions ───────────────────────────────────────────────
async function openFles(id,fromDetail){
  const wijn=state.wijnen.find(w=>w.id===id);
  if(!wijn||wijn.hoeveelheid<=0) return;
  const updated={...wijn,hoeveelheid:wijn.hoeveelheid-1};
  state.wijnen=state.wijnen.map(w=>w.id===id?updated:w);
  doRender();
  await saveWijnDb(updated);
}

async function saveWijn(){
  if(!state.form.naam.trim()) return;
  if(state.form.land==='Anders'&&state.form.land_custom){await addCustom('landen',state.form.land_custom);state.form.land=state.form.land_custom;}
  if(state.form.druif_single==='Anders'&&state.form.druif_single_custom){await addCustom('druiven',state.form.druif_single_custom);state.form.druif_single=state.form.druif_single_custom;}
  if(state.form.druif_single&&state.form.druif_single!=='Anders') state.form.druif=[state.form.druif_single];
  state.saving=true; doRender();
  const saved=await saveWijnDb(state.form);
  if(saved){
    if(state.editId) state.wijnen=state.wijnen.map(w=>w.id===state.editId?saved:w);
    else state.wijnen=[saved,...state.wijnen];
  }
  state.saving=false; state.showForm=false; state.form={...EMPTY}; state.editId=null;
  window.scrollTo(0,0); doRender();
}

async function deleteWijn(id){
  state.wijnen=state.wijnen.filter(w=>w.id!==id);
  state.detail=null; doRender();
  await deleteWijnDb(id);
}

function setState(updates){Object.assign(state,updates);doRender();}

// ── Detail modal ──────────────────────────────────────────
function renderDetail(){
  const w=state.wijnen.find(x=>x.id===state.detail.id)||state.detail;
  const color=CAT_COLORS[w.categorie]||'#8B1A1A';
  const bg=h('div',{className:'modal-bg'});
  bg.addEventListener('click',()=>setState({detail:null}));
  const modal=h('div',{className:'modal'});
  modal.addEventListener('click',e=>e.stopPropagation());
  const topRow=h('div',{style:{display:'flex',gap:'14px',marginBottom:'18px'}});
  if(w.foto) topRow.appendChild(h('img',{src:w.foto,alt:w.naam,style:{width:'85px',height:'125px',objectFit:'cover',borderRadius:'10px',flexShrink:'0'}}));
  else topRow.appendChild(h('div',{style:{width:'85px',height:'125px',background:'#f9f5f1',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}},h('span',{style:{fontSize:'30px'}},'🍷')));
  const info=h('div',{style:{flex:'1'}},
    h('span',{style:{background:color,color:'#fff',fontSize:'10px',padding:'2px 8px',borderRadius:'20px',textTransform:'uppercase'}},w.categorie),
    h('h2',{style:{margin:'6px 0 2px',color:'#8B1A1A',fontSize:'17px',fontWeight:'400'}},w.naam),
    h('div',{style:{color:'#999',fontSize:'12px',marginBottom:'8px'}},[w.jaar,w.land,w.regio].filter(Boolean).join(' · ')),
    stars(w.score,null)
  );
  const qtyRow=h('div',{style:{marginTop:'10px',display:'flex',alignItems:'center',gap:'10px'}},h('div',{style:{color:'#8B1A1A',fontSize:'20px',fontWeight:'700'}},w.hoeveelheid+'x'));
  if(w.hoeveelheid>0){
    const ob=h('button',{style:{background:'#8B1A1A',color:'#fff',border:'none',borderRadius:'8px',padding:'6px 14px',fontSize:'12px',cursor:'pointer',fontFamily:'Georgia,serif'}},'🍾 Open fles');
    ob.addEventListener('click',()=>openFles(w.id,true));
    qtyRow.appendChild(ob);
  }
  info.appendChild(qtyRow);
  topRow.appendChild(info);
  modal.appendChild(topRow);
  const details=[['Wijnmaker',w.wijnmaker],['Prijs',w.prijs?`€${w.prijs}`:''],['Capaciteit',w.capaciteit],['Alcohol',w.alcohol?`${w.alcohol}%`:''],['Appellatie',w.appellatie],['Subregio',w.subregio],['Opslag',w.opslaglocatie],['Bewaring',w.bewaring],['Herkomst',w.herkomst],['Van wie',w.van_wie]].filter(([,v])=>v);
  if(details.length) modal.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',marginBottom:'14px'}},...details.map(([k,v])=>h('div',{},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'2px'}},k),h('div',{style:{color:'#555',fontSize:'13px'}},v)))));
  if(w.url) modal.appendChild(h('div',{style:{marginBottom:'10px'}},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'2px'}},'Website'),h('a',{href:w.url,target:'_blank',style:{color:'#8B1A1A',fontSize:'13px',wordBreak:'break-all'}},w.url)));
  if(w.druif?.length) modal.appendChild(h('div',{style:{marginBottom:'10px'}},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'5px'}},'Druif'),h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px'}},...w.druif.map(d=>h('span',{className:'chip'},d)))));
  if(w.eten?.length) modal.appendChild(h('div',{style:{marginBottom:'10px'}},h('div',{style:{color:'#bbb',fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'5px'}},'Spijscombinaties'),h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px'}},...w.eten.map(d=>h('span',{className:'chip'},d)))));
  if(w.opmerkingen) modal.appendChild(h('div',{style:{background:'#f9f5f1',borderRadius:'10px',padding:'10px 14px',marginBottom:'14px',color:'#999',fontSize:'13px',fontStyle:'italic'}},`"${w.opmerkingen}"`));
  const editBtn=h('button',{className:'action-btn'},'✏️ Bewerken');
  editBtn.addEventListener('click',()=>{const form={...w,druif_single:(w.druif&&w.druif.length)?w.druif[0]:''};setState({form,editId:w.id,detail:null,showForm:true});});
  const delBtn=h('button',{className:'del-btn'},'🗑️');
  delBtn.addEventListener('click',()=>{if(confirm(`"${w.naam}" verwijderen?`)) deleteWijn(w.id);});
  const closeBtn=h('button',{className:'close-btn'},'Sluiten');
  closeBtn.addEventListener('click',()=>setState({detail:null}));
  modal.appendChild(h('div',{style:{display:'flex',gap:'8px'}},editBtn,delBtn,closeBtn));
  bg.appendChild(modal);
  return bg;
}

// ── Form ──────────────────────────────────────────────────
function renderForm(){
  const f=state.form;
  const overlay=h('div',{className:'form-overlay'});
  const header=h('div',{className:'form-header'});
  header.appendChild(h('h2',{style:{margin:'0',color:'#8B1A1A',fontWeight:'400',fontSize:'19px'}},state.editId?'Wijn bewerken':'Wijn toevoegen'));
  const closeX=h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'22px',cursor:'pointer'}},'✕');
  closeX.addEventListener('click',()=>setState({showForm:false}));
  header.appendChild(closeX);
  overlay.appendChild(header);
  const body=h('div',{className:'form-body'});

  // Foto
  const fotoWrap=h('div',{className:'field'},h('label',{className:'lbl'},'Foto'));
  const fotoBox=h('div',{style:{border:'2px dashed #e0d5cc',borderRadius:'12px',height:'130px',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',background:'#f5f0eb'}});
  if(f.foto) fotoBox.appendChild(h('img',{src:f.foto,alt:'',style:{width:'100%',height:'100%',objectFit:'cover'}}));
  else fotoBox.appendChild(h('div',{style:{textAlign:'center',color:'#bbb'}},h('div',{style:{fontSize:'26px',marginBottom:'5px'}},'📷'),h('div',{style:{fontSize:'12px'}},'Tik om foto toe te voegen')));
  const fileInp=h('input',{type:'file',accept:'image/*',style:{display:'none'}});
  fileInp.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const base64=ev.target.result;
      state.form.foto=base64;
      fotoBox.innerHTML='';
      fotoBox.appendChild(h('div',{style:{textAlign:'center',color:'#8B1A1A'}},h('div',{style:{fontSize:'22px',marginBottom:'6px'}},'🔍'),h('div',{style:{fontSize:'12px'}},'Etiket herkennen...')));
      try {
        const imageData=base64.split(',')[1];
        const mediaType=base64.split(';')[0].split(':')[1];
        const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:imageData}},{type:'text',text:'Analyseer dit wijnetiket en geef ALLEEN een JSON object terug. Formaat: {"naam":"","categorie":"Rood|Wit|Rose|Mousseux|Dessert|Fortified","jaar":"","alcohol":"","land":"","regio":"","subregio":"","appellatie":"","wijnmaker":"","druif":[],"opmerkingen":""} Vul alleen in wat je zeker weet. druif is een array. ALLEEN JSON.'}]}]})});
        const data=await response.json();
        const parsed=JSON.parse((data.content&&data.content[0]?data.content[0].text:'').replace(/```json|```/g,'').trim());
        Object.assign(state.form,parsed,{foto:base64});
      } catch(err){/* foto bewaren */}
      doRender();
    };
    reader.readAsDataURL(file);
  });
  fotoBox.addEventListener('click',()=>fileInp.click());
  fotoWrap.appendChild(fotoBox); fotoWrap.appendChild(fileInp);
  body.appendChild(fotoWrap);

  body.appendChild(inputEl('Naam van wijn *','naam','text','bijv. Barolo Riserva'));

  const catSel=h('select',{},...BASE_CATEGORIES.map(o=>{const opt=h('option',{value:o},o);if(o===f.categorie)opt.selected=true;return opt;}));
  catSel.addEventListener('change',e=>{state.form.categorie=e.target.value;doRender();});
  body.appendChild(fieldEl('Categorie',catSel));

  body.appendChild(selectEl('Druivensoort','druif_single',getDruiven()));

  body.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
    (()=>{const sel=h('select',{},h('option',{value:''},'Kiezen...'),...JAREN.map(o=>{const opt=h('option',{value:o},o);if(o===f.jaar)opt.selected=true;return opt;}));sel.addEventListener('change',e=>{state.form.jaar=e.target.value;});return fieldEl('Jaar',sel);})(),
    inputEl('Prijs (€)','prijs','number','0.00')
  ));
  body.appendChild(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
    (()=>{const sel=h('select',{},h('option',{value:''},'Kiezen...'),...CAPACITEITEN.map(o=>{const opt=h('option',{value:o},o);if(o===f.capaciteit)opt.selected=true;return opt;}));sel.addEventListener('change',e=>{state.form.capaciteit=e.target.value;});return fieldEl('Capaciteit',sel);})(),
    inputEl('Alcohol (%)','alcohol','number','12.5')
  ));

  const minBtn=h('button',{className:'qty-btn'},'−');
  minBtn.addEventListener('click',()=>{state.form.hoeveelheid=Math.max(0,state.form.hoeveelheid-1);doRender();});
  const plusBtn=h('button',{className:'qty-btn'},'+');
  plusBtn.addEventListener('click',()=>{state.form.hoeveelheid=state.form.hoeveelheid+1;doRender();});
  body.appendChild(fieldEl('Hoeveelheid',h('div',{style:{display:'flex',alignItems:'center',gap:'14px'}},minBtn,h('span',{style:{color:'#8B1A1A',fontSize:'20px',fontWeight:'700',minWidth:'28px',textAlign:'center'}},String(f.hoeveelheid)),plusBtn)));

  body.appendChild(h('div',{className:'divider'},
    h('div',{className:'section-title'},'Oorsprong'),
    selectEl('Land','land',getLanden()),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},inputEl('Regio','regio','text','bijv. Toscane'),inputEl('Subregio','subregio','text','bijv. Chianti')),
    inputEl('Appellatie','appellatie','text','bijv. Barolo DOCG'),
    inputEl('Wijnmaker / Domein','wijnmaker','text','bijv. Antinori')
  ));

  body.appendChild(h('div',{className:'divider'},
    h('div',{className:'section-title'},'Overige informatie'),
    multiSelectEl('Spijscombinaties','eten',BASE_ETEN),
    inputEl('Opslaglocatie','opslaglocatie','text','bijv. Rek A, positie 3'),
    selectEl('Bewaring','bewaring',getBewaring()),
    selectEl('Herkomst','herkomst',getHerkomst()),
    ...(f.herkomst==='Gekregen'?[inputEl('Van wie','van_wie','text','bijv. Jan en Marie')]:[]),
    ...(f.herkomst==='Online'?[inputEl('Website / URL','url','url','bijv. https://wijnvoordeel.nl')]:[]),
    fieldEl('Score',stars(f.score,v=>{state.form.score=v;})),
    fieldEl('Opmerkingen',(()=>{const ta=h('textarea',{placeholder:'Tasting notes, bijzonderheden...',rows:'3'},f.opmerkingen||'');ta.style.resize='vertical';ta.addEventListener('input',e=>{state.form.opmerkingen=e.target.value;});return ta;})())
  ));

  const submitBtn=h('button',{style:{width:'100%',background:f.naam.trim()?'#8B1A1A':'#e8e0d8',color:f.naam.trim()?'#fff':'#bbb',border:'none',borderRadius:'12px',padding:'14px',fontSize:'15px',cursor:f.naam.trim()?'pointer':'default',fontFamily:'Georgia,serif',letterSpacing:'0.5px',marginBottom:'30px'}},
    state.saving?'Opslaan...':(state.editId?'✓ Wijzigingen opslaan':'✓ Wijn toevoegen')
  );
  submitBtn.addEventListener('click',saveWijn);
  body.appendChild(submitBtn);
  overlay.appendChild(body);
  requestAnimationFrame(()=>{if(state.formScroll) overlay.scrollTop=state.formScroll;});
  overlay.addEventListener('scroll',()=>{state.formScroll=overlay.scrollTop;});
  return overlay;
}

// ── Login screen ──────────────────────────────────────────
function renderLogin(){
  const isLogin=state.loginMode==='login';
  const wrap=h('div',{className:'login-wrap'});
  const box=h('div',{className:'login-box'});
  box.appendChild(h('div',{className:'login-title'},'🍷 Wijnkelder'));
  box.appendChild(h('div',{className:'login-sub'},isLogin?'Inloggen op je kelder':'Nieuw account aanmaken'));

  const emailInp=h('input',{type:'email',placeholder:'E-mailadres',style:{marginBottom:'10px'}});
  const passInp=h('input',{type:'password',placeholder:'Wachtwoord',style:{marginBottom:'4px'}});
  const errDiv=h('div',{className:'login-err'},state.loginErr);
  box.appendChild(h('div',{className:'field'},emailInp));
  box.appendChild(h('div',{className:'field'},passInp));
  box.appendChild(errDiv);

  const loginBtn=h('button',{className:'login-btn'},isLogin?'Inloggen':'Account aanmaken');
  loginBtn.addEventListener('click',async()=>{
    const email=emailInp.value.trim();
    const pass=passInp.value;
    if(!email||!pass){state.loginErr='Vul e-mail en wachtwoord in.';doRender();return;}
    loginBtn.textContent='Even geduld...';
    loginBtn.disabled=true;
    if(isLogin){
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error){state.loginErr=error.message==='Invalid login credentials'?'Verkeerd e-mail of wachtwoord.':error.message;doRender();}
    } else {
      const {error}=await sb.auth.signUp({email,password:pass});
      if(error){state.loginErr=error.message;doRender();}
      else{state.loginErr='';state.loginMode='login';alert('Account aangemaakt! Controleer je e-mail om te bevestigen, dan kun je inloggen.');doRender();}
    }
  });
  box.appendChild(loginBtn);
  box.appendChild(h('div',{className:'login-switch'},
    isLogin?'Nog geen account? ':' Al een account? ',
    h('span',{onClick:()=>setState({loginMode:isLogin?'register':'login',loginErr:''})},isLogin?'Registreren':'Inloggen')
  ));
  wrap.appendChild(box);
  return wrap;
}

// ── Main render ───────────────────────────────────────────
function doRender(){
  const root=document.getElementById('root');
  root.innerHTML='';

  if(state.loading){root.appendChild(h('div',{className:'loading'},'🍷 Laden...'));return;}
  if(!state.user){root.appendChild(renderLogin());return;}

  const {wijnen,zoom,search,filterCat}=state;
  const cols=zoom;
  const totaal=wijnen.reduce((a,w)=>a+w.hoeveelheid,0);
  const waarde=wijnen.reduce((a,w)=>a+(parseFloat(w.prijs)||0)*w.hoeveelheid,0);
  const gefilterd=wijnen.filter(w=>{
    const q=search.toLowerCase();
    return(!q||w.naam.toLowerCase().includes(q)||(w.wijnmaker||'').toLowerCase().includes(q)||(w.land||'').toLowerCase().includes(q))&&(!filterCat||w.categorie===filterCat);
  });

  // Header
  const header=h('div',{style:{background:'linear-gradient(135deg,#fff5f0,#f5ede6)',borderBottom:'1px solid #c9856633',padding:'16px 16px 12px',position:'sticky',top:'0',zIndex:'50'}});
  const topRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
    h('div',{},h('h1',{style:{margin:'0',fontSize:'22px',color:'#8B1A1A',fontWeight:'400',letterSpacing:'2px',textTransform:'uppercase'}},'🍷 Wijnkelder'),h('p',{style:{margin:'2px 0 0',color:'#aaa',fontSize:'12px',letterSpacing:'1px'}},`${totaal} flessen · €${waarde.toFixed(0)}`))
  );
  // Right side: logout + add
  const rightBtns=h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}});
  const logoutBtn=h('button',{style:{background:'none',border:'1px solid #e0d5cc',color:'#aaa',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',cursor:'pointer',fontFamily:'Georgia,serif'}},'Uitloggen');
  logoutBtn.addEventListener('click',async()=>{await sb.auth.signOut();});
  const addBtn=h('button',{className:'btn',style:{background:'#8B1A1A',color:'#fff',borderRadius:'10px',padding:'10px 14px',fontSize:'13px',letterSpacing:'0.5px'}},'+ Toevoegen');
  addBtn.addEventListener('click',()=>{state.form={...EMPTY};state.editId=null;state.formScroll=0;setState({showForm:true});});
  rightBtns.appendChild(logoutBtn);
  rightBtns.appendChild(addBtn);
  topRow.appendChild(rightBtns);
  header.appendChild(topRow);

  const searchInp=h('input',{type:'text',placeholder:'Zoeken...',value:search,style:{width:'100%',background:'#fff',border:'1px solid #e0d5cc',borderRadius:'8px',color:'#2a1a1a',padding:'8px 12px',fontSize:'13px',outline:'none',marginBottom:'10px',boxSizing:'border-box'}});
  searchInp.addEventListener('input',e=>{state.search=e.target.value;});
  searchInp.addEventListener('input',()=>{clearTimeout(searchInp._t);searchInp._t=setTimeout(()=>doRender(),300);});
  header.appendChild(searchInp);

  const ROW1=['','Rood','Wit','Rosé'];
  const ROW2=['Mousseux','Dessert','Fortified'];
  const filterZoomRow=h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}});
  const filterWrap=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',flex:'1'}});
  [...ROW1,...ROW2].forEach(c=>{
    const btn=h('button',{className:'filter-btn'+(filterCat===c?' active':''),style:{background:filterCat===c?(CAT_COLORS[c]||'#8B1A1A'):'#fff',borderColor:filterCat===c?(CAT_COLORS[c]||'#8B1A1A'):'#e0d5cc'}},c||'Alle');
    btn.addEventListener('click',()=>setState({filterCat:c}));
    if(c==='Mousseux') filterWrap.appendChild(h('div',{style:{flexBasis:'100%',height:'0'}}));
    filterWrap.appendChild(btn);
  });
  filterZoomRow.appendChild(filterWrap);
  const zoomBtns=h('div',{style:{display:'flex',flexDirection:'row',alignItems:'center',gap:'4px',flexShrink:'0'}});
  const zm=h('button',{style:{background:'#8B1A1A',color:'#fff',border:'none',borderRadius:'8px',width:'36px',height:'36px',fontSize:'20px',cursor:'pointer',fontFamily:'Georgia,serif',display:'flex',alignItems:'center',justifyContent:'center'}},'−');
  zm.addEventListener('touchend',e=>{e.preventDefault();state.zoom=state.zoom+1;doRender();});
  zm.addEventListener('click',e=>{e.preventDefault();state.zoom=state.zoom+1;doRender();});
  const zoomInd=h('span',{style:{fontSize:'11px',color:'#8B1A1A',fontWeight:'600',textAlign:'center',minWidth:'22px'}},String(cols)+'×');
  const zp=h('button',{style:{background:'#8B1A1A',color:'#fff',border:'none',borderRadius:'8px',width:'36px',height:'36px',fontSize:'20px',cursor:'pointer',fontFamily:'Georgia,serif',display:'flex',alignItems:'center',justifyContent:'center'}},'+');
  zp.addEventListener('touchend',e=>{e.preventDefault();state.zoom=Math.max(1,state.zoom-1);doRender();});
  zp.addEventListener('click',e=>{e.preventDefault();state.zoom=Math.max(1,state.zoom-1);doRender();});
  zoomBtns.appendChild(zm);zoomBtns.appendChild(zoomInd);zoomBtns.appendChild(zp);
  filterZoomRow.appendChild(zoomBtns);
  header.appendChild(filterZoomRow);
  root.appendChild(header);

  // Gallery
  if(gefilterd.length===0){
    root.appendChild(h('div',{style:{textAlign:'center',padding:'60px 20px',color:'#bbb'}},h('div',{style:{fontSize:'40px',marginBottom:'10px'}},'🍷'),h('div',{},'Geen wijnen gevonden')));
  } else {
    const groups={};
    gefilterd.forEach(w=>{const key=w.land&&w.land.trim()?w.land.trim():'Onbekend';if(!groups[key])groups[key]=[];groups[key].push(w);});
    Object.keys(groups).sort((a,b)=>a==='Onbekend'?1:b==='Onbekend'?-1:a.localeCompare(b)).forEach(land=>{
      root.appendChild(h('div',{style:{padding:'12px 10px 4px',display:'flex',alignItems:'center',gap:'8px'}},
        h('span',{style:{color:'#8B1A1A',fontSize:'13px',fontWeight:'600',letterSpacing:'1px',textTransform:'uppercase'}},land),
        h('span',{style:{color:'#bbb',fontSize:'12px'}},'('+groups[land].length+')')
      ));
      const grid=h('div',{className:'grid',style:{gridTemplateColumns:`repeat(${cols},1fr)`,gridAutoRows:'1fr',paddingTop:'0'}});
      groups[land].forEach(w=>grid.appendChild(wijnCard(w)));
      root.appendChild(grid);
    });
  }

  if(state.detail) root.appendChild(renderDetail());
  if(state.showForm) root.appendChild(renderForm());
}

// ── Pinch to zoom ─────────────────────────────────────────
let _pinchStart=null,_pinchActive=false;
document.addEventListener('touchstart',e=>{if(e.touches.length===2&&!state.showForm){_pinchStart=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);_pinchActive=true;}},{passive:false});
document.addEventListener('touchmove',e=>{if(_pinchActive&&e.touches.length===2&&!state.showForm){e.preventDefault();const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const delta=dist-_pinchStart;if(Math.abs(delta)>30){if(delta<0){state.zoom++;_pinchStart=dist;doRender();}else if(delta>0&&state.zoom>1){state.zoom--;_pinchStart=dist;doRender();}}}},{passive:false});
document.addEventListener('touchend',e=>{if(e.touches.length<2){_pinchActive=false;_pinchStart=null;}},{passive:true});

// ── Auth listener ─────────────────────────────────────────
sb.auth.onAuthStateChange(async(event,session)=>{
  state.user=session?.user||null;
  if(state.user){
    await Promise.all([loadWijnen(),loadCustom()]);
  }
  state.loading=false;
  doRender();
});
</script>
</body>
